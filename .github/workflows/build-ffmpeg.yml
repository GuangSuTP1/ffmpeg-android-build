name: Build FFmpeg Android (arm64-v8a)

于:
  推送:
    分支: [ "master", "main" ]
  工作流程调度:   # 支持手动触发

env:
  # Android SDK 相关路径（GitHub Actions 预置）
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  ANDROID_SDK_HOME: /usr/local/lib/android/sdk   # 脚本要求
  ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653   # 明确指定
  FFMPEG_EXTERNAL_LIBRARIES: "libmp3lame libx264 libx265 libvpx libopus libvorbis libfdk_aac libfreetype libass libfontconfig libfribidi libsrt"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK (r25c)
        run: |
          echo "y" | sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make cmake pkg-config python3-pip ninja-build yasm autoconf automake libtool gettext
          pip3 install --upgrade meson

      - name: Set cross-compile environment for arm64-v8a
        run: |
          API=21
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          SYSROOT="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot"

          echo "API=$API" >> $GITHUB_ENV
          echo "TOOLCHAIN=$TOOLCHAIN" >> $GITHUB_ENV
          echo "SYSROOT=$SYSROOT" >> $GITHUB_ENV

          echo "CC=$TOOLCHAIN/aarch64-linux-android${API}-clang" >> $GITHUB_ENV
          echo "CXX=$TOOLCHAIN/aarch64-linux-android${API}-clang++" >> $GITHUB_ENV
          echo "AR=$TOOLCHAIN/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=$TOOLCHAIN/llvm-ranlib" >> $GITHUB_ENV
          echo "NM=$TOOLCHAIN/llvm-nm" >> $GITHUB_ENV
          echo "STRIP=$TOOLCHAIN/llvm-strip" >> $GITHUB_ENV

          echo "CFLAGS=--sysroot=$SYSROOT -O2 -fPIC" >> $GITHUB_ENV
          echo "LDFLAGS=--sysroot=$SYSROOT" >> $GITHUB_ENV

          # PKG_CONFIG_PATH so autoconf-based builds find previously installed externals
          echo "PKG_CONFIG_PATH=$GITHUB_WORKSPACE/build/external/arm64-v8a/lib/pkgconfig" >> $GITHUB_ENV

      - name: Show toolchain diagnostics
        run: |
          echo "CC=$CC"
          $CC --version || true
          echo "AR=$AR"
          $AR --version || true
          echo "SYSROOT=$SYSROOT"
          ls -ld $TOOLCHAIN || true

      # ---------- 以下为新增：编译所有前置库 ----------
      - name: Create external libraries directory
        run: |
          mkdir -p build/external/arm64-v8a/lib
          mkdir -p build/external/arm64-v8a/include

      - name: Build libmp3lame
        run: |
          cd /tmp
          wget https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz
          tar -xzf lame-3.100.tar.gz
          cd lame-3.100

          # Android API level for clang wrapper
          API=21
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"

          # Use NDK clang toolchain so configure detects correct target (aarch64)
          export CC="${TOOLCHAIN}/aarch64-linux-android${API}-clang"
          export AR="${TOOLCHAIN}/llvm-ar"
          export RANLIB="${TOOLCHAIN}/llvm-ranlib"
          export NM="${TOOLCHAIN}/llvm-nm"
          export STRIP="${TOOLCHAIN}/llvm-strip"
          export CFLAGS="--sysroot=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot -O2 -fPIC"

          ./configure \
          --host=aarch64-linux-android \
          --prefix=${{ github.workspace }}/build/external/arm64-v8a \
          --with-sysroot=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot \
          --disable-shared \
          --enable-static \
          --disable-asm

          make -j$(nproc)
          make install

      - name: Build libx264
        run: |
          cd /tmp
          git clone https://code.videolan.org/videolan/x264.git
          cd x264
          ./configure \
            --host=aarch64-linux-android \
            --sysroot=$SYSROOT \
            --prefix=$GITHUB_WORKSPACE/build/external/arm64-v8a \
            --enable-static --disable-shared --disable-cli \
            --extra-cflags="$CFLAGS" --extra-ldflags="$LDFLAGS" \
            CC="$CC" AR="$AR" RANLIB="$RANLIB" NM="$NM" STRIP="$STRIP"
          make -j$(nproc)
          make install

      - name: Build libx265
        run: |
          cd /tmp
          wget https://bitbucket.org/multicoreware/x265_git/downloads/x265_3.5.tar.gz
          tar -xzf x265_3.5.tar.gz
          cd x265_3.5/build/linux
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DENABLE_SHARED=OFF \
            -DENABLE_CLI=OFF \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/build/external/arm64-v8a \
            ../../source
          make -j$(nproc)
          make install

      - name: Build libvpx
        run: |
          cd /tmp
          git clone https://chromium.googlesource.com/webm/libvpx
          cd libvpx
          ./configure --target=arm64-android-gcc \
            --prefix=${{ github.workspace }}/build/external/arm64-v8a \
            --disable-shared --enable-static \
            --disable-examples --disable-tools --disable-docs \
            CC="$CC" AR="$AR" RANLIB="$RANLIB" CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(nproc)
          make install

      - name: Build libopus
        run: |
          cd /tmp
          wget https://archive.mozilla.org/pub/opus/opus-1.4.tar.gz
          tar -xzf opus-1.4.tar.gz
          cd opus-1.4
          ./configure --host=aarch64-linux-android \
            --prefix=${{ github.workspace }}/build/external/arm64-v8a \
            --disable-shared --enable-static \
            CC="$CC" CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(nproc)
          make install

      - name: Build libvorbis
        run: |
          cd /tmp
          wget https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.gz
          tar -xzf libvorbis-1.3.7.tar.gz
          cd libvorbis-1.3.7
          ./configure --host=aarch64-linux-android \
            --prefix=${{ github.workspace }}/build/external/arm64-v8a \
            --disable-shared --enable-static \
            CC="$CC" CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(nproc)
          make install

      - name: Build libfdk_aac
        run: |
          cd /tmp
          git clone https://github.com/mstorsjo/fdk-aac
          cd fdk-aac
          ./autogen.sh
          ./configure --host=aarch64-linux-android \
            --prefix=${{ github.workspace }}/build/external/arm64-v8a \
            --disable-shared --enable-static \
            CC="$CC" CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(nproc)
          make install

      - name: Build libfreetype
        run: |
          cd /tmp
          wget https://download.savannah.gnu.org/releases/freetype/freetype-2.13.2.tar.gz
          tar -xzf freetype-2.13.2.tar.gz
          cd freetype-2.13.2
          ./configure --host=aarch64-linux-android \
            --prefix=${{ github.workspace }}/build/external/arm64-v8a \
            --disable-shared --enable-static \
            CC="$CC" CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(nproc)
          make install

      - name: Build libass
        run: |
          cd /tmp
          wget https://github.com/libass/libass/releases/download/0.17.1/libass-0.17.1.tar.gz
          tar -xzf libass-0.17.1.tar.gz
          cd libass-0.17.1
          ./configure --host=aarch64-linux-android \
            --prefix=${{ github.workspace }}/build/external/arm64-v8a \
            --disable-shared --enable-static \
            --disable-require-system-font-provider \
            CC="$CC" CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(nproc)
          make install

      - name: Build libfontconfig
        run: |
          cd /tmp
          wget https://www.freedesktop.org/software/fontconfig/release/fontconfig-2.14.2.tar.gz
          tar -xzf fontconfig-2.14.2.tar.gz
          cd fontconfig-2.14.2
          ./configure --host=aarch64-linux-android \
            --prefix=${{ github.workspace }}/build/external/arm64-v8a \
            --disable-shared --enable-static \
            --disable-docs --disable-tools \
            CC="$CC" CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(nproc)
          make install

      - name: Build libfribidi
        run: |
          cd /tmp
          wget https://github.com/fribidi/fribidi/releases/download/v1.0.13/fribidi-1.0.13.tar.gz
          tar -xzf fribidi-1.0.13.tar.gz
          cd fribidi-1.0.13
          ./configure --host=aarch64-linux-android \
            --prefix=${{ github.workspace }}/build/external/arm64-v8a \
            --disable-shared --enable-static \
            CC="$CC" CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS"
          make -j$(nproc)
          make install

      - name: Build libsrt
        run: |
          cd /tmp
          git clone https://github.com/Haivision/srt.git
          cd srt
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DENABLE_SHARED=OFF \
            -DENABLE_STATIC=ON \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/build/external/arm64-v8a \
            .
          make -j$(nproc)
          make install
      # ---------- 前置库编译结束 ----------

      - name: Make script executable
        run: chmod +x ffmpeg-android-maker.sh

      - name: Build FFmpeg for arm64-v8a 
        run: ./ffmpeg-android-maker.sh -abis=arm64-v8a,armeabi-v7a --enable-all-free --enable-all-gpl

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-android-arm64
          path: build/
